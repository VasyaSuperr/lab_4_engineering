services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-net

  broker1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://broker1:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - kafka-net

  broker2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29093,PLAINTEXT_EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://broker2:29093,PLAINTEXT_EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - kafka-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - broker1
      - broker2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:29092,broker2:29093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - broker1
      - broker2
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b broker1:29092 1 60

      echo 'Creating topics...'
      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic Topic1
      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic Topic2

      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic daily-average-duration
      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic daily-trip-count
      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic daily-most-popular-start-station
      kafka-topics --create --if-not-exists --bootstrap-server broker1:29092 --replication-factor 2 --partitions 3 --topic daily-top3-stations

      echo 'Topics created:'
      kafka-topics --list --bootstrap-server broker1:29092
      "
    networks:
      - kafka-net

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: kafka-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker1:29092,broker2:29093
      CSV_FILE: /data/Divvy_Trips_2019_Q4.csv
      TOPIC1: Topic1
      TOPIC2: Topic2
      MESSAGE_DELAY: "0.1"
    volumes:
      - ./Divvy_Trips_2019_Q4.csv:/data/Divvy_Trips_2019_Q4.csv:ro
    networks:
      - kafka-net

  stream-processor:
    build:
      context: ./stream-processor
      dockerfile: Dockerfile
    container_name: kafka-stream-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker1:29092,broker2:29093
      INPUT_TOPIC: Topic1
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
